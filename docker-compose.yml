services:
  davinci-zkvm:
    image: davinci-zkvm:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${LISTEN_PORT:-8080}:8080"
    volumes:
      - ${PROVING_KEY_PATH:-~/.zisk/provingKey}:/proving-key:ro
      - proofs:/proofs
    environment:
      - PROOF_OUTPUT_DIR=/proofs
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  proofs:
