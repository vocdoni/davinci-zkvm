# davinci-zkvm Docker Compose
#
# Profiles:
#   cuda  — NVIDIA GPU prover (default). Requires NVIDIA driver 570+, CUDA 12.8,
#           nvidia-container-toolkit.
#   cpu   — API-only, no proof generation. ZisK v0.15.0 GPU proving keys are
#           incompatible with CPU provers (different Merkle tree format).
#
# Usage:
#   docker compose --profile cuda up -d   # GPU prover (default)
#   docker compose --profile cpu  up -d   # CPU API-only
#
# The default profile is set to 'cuda' via the .env file. Override with:
#   COMPOSE_PROFILES=cpu docker compose up -d

services:
  davinci-zkvm:
    profiles: [cuda]
    image: davinci-zkvm-cuda:latest
    build:
      context: .
      dockerfile: Dockerfile.cuda
    ports:
      - "${LISTEN_PORT:-8080}:8080"
    volumes:
      - ${PROVING_KEY_PATH:-~/.zisk/provingKey}:/proving-key
      - proofs:/proofs
    environment:
      - PROOF_OUTPUT_DIR=/proofs
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
      - ZISK_MPI_PROCS=${ZISK_MPI_PROCS:-1}
      - ZISK_MPI_THREADS=${ZISK_MPI_THREADS:-0}
      - ZISK_MPI_BIND_TO=${ZISK_MPI_BIND_TO:-none}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  davinci-zkvm-cpu:
    profiles: [cpu]
    image: davinci-zkvm:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${LISTEN_PORT:-8080}:8080"
    volumes:
      - ${PROVING_KEY_PATH:-~/.zisk/provingKey}:/proving-key
      - proofs:/proofs
    environment:
      - PROOF_OUTPUT_DIR=/proofs
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
      - ZISK_MPI_PROCS=${ZISK_MPI_PROCS:-1}
      - ZISK_MPI_THREADS=${ZISK_MPI_THREADS:-0}
      - ZISK_MPI_BIND_TO=${ZISK_MPI_BIND_TO:-none}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  proofs:
