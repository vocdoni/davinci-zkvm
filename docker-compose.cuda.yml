services:
  davinci-zkvm:
    image: davinci-zkvm-cuda:latest
    build:
      context: .
      dockerfile: Dockerfile.cuda
    ports:
      - "${LISTEN_PORT:-8080}:8080"
    volumes:
      - ${PROVING_KEY_PATH:-~/.zisk/provingKey}:/proving-key:ro
      - proofs:/proofs
    environment:
      - PROOF_OUTPUT_DIR=/proofs
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  proofs:
